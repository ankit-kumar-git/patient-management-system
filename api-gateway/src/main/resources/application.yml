server:
  port: 4004

spring:
  cloud:
    gateway:
      routes:
          ## http:localhost:4004/auth/login
          ##API Gateway -> http://auth-service:4005/login
        - id: auth-service-route
          uri: http://auth-service:4005
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1


        ## for routing req to patient-service
        - id: patient-service-route
          uri: http://patient-service:4000
          predicates:
            - Path=/api/patients,/api/patients/**
          filters:
            - StripPrefix=1
            - JwtValidation

        ##for routing to swagger (for example)
        - id: api-docs-patient-route
          uri: http://patient-service:4000
          predicates:
            - Path=/api-docs/patients
          filters:
            - RewritePath=/api-docs/patients,/v3/api-docs

          ##REST API -> http://localhost:4004/api-docs/patients
          ##API Gateway -> http://patient-service:4000/v3/api-docs

        - id: api-docs-auth-service
          uri: http://auth-service:4005
          predicates:
            - Path=/api-docs/auth
          filters:
            - RewritePath=/api-docs/auth,/v3/api-docs